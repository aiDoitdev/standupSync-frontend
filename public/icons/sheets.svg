<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Google Sheets document shape with folded top-right corner -->
  <path d="M8 6a2 2 0 0 1 2-2h20l10 10v28a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2V6z" fill="#23A566"/>
  <!-- Folded corner -->
  <path d="M30 4l10 10h-8a2 2 0 0 1-2-2V4z" fill="#1A8050"/>
  <!-- Spreadsheet grid — white cells with column/row dividers -->
  <!-- Header row background -->
  <rect x="12" y="18" width="24" height="6" fill="white" opacity="0.25"/>
  <!-- Row 1 -->
  <rect x="12" y="25" width="11" height="5" fill="white" opacity="0.15"/>
  <rect x="24" y="25" width="12" height="5" fill="white" opacity="0.15"/>
  <!-- Row 2 -->
  <rect x="12" y="31" width="11" height="5" fill="white" opacity="0.1"/>
  <rect x="24" y="31" width="12" height="5" fill="white" opacity="0.1"/>
  <!-- Grid lines -->
  <line x1="12" y1="18" x2="36" y2="18" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="24" x2="36" y2="24" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="30" x2="36" y2="30" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="36" x2="36" y2="36" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="12" y1="18" x2="12" y2="36" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="23" y1="18" x2="23" y2="36" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="36" y1="18" x2="36" y2="36" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Outer grid border -->
  <rect x="12" y="18" width="24" height="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
</svg>
